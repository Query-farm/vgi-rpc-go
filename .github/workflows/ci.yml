name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

  conformance:
    needs: lint
    runs-on: ubuntu-latest
    env:
      GOCOVERDIR: ${{ github.workspace }}/_covdata
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build conformance worker with coverage
        run: go build -cover -covermode=atomic -o conformance-worker ./conformance/cmd/vgi-rpc-conformance-go

      # The Go worker tracks the *unreleased* Python reference (the TCP
      # transport — tcp_connect / --tcp — lands on main ahead of PyPI), so
      # install vgi_rpc from source off the default branch rather than
      # `pip install vgi-rpc`. external extras (aiohttp etc.) are required by
      # the externalize-always HTTP conformance variant; the host
      # conformance_describe fixture (test_go_conformance.py) runs __describe__
      # against the real Go worker across every transport.
      - name: Clone vgi-rpc-python reference
        run: git clone --depth 1 https://github.com/Query-farm/vgi-rpc-python.git "$RUNNER_TEMP/vgi-rpc-python"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "${RUNNER_TEMP}/vgi-rpc-python[http,cli,external]" pytest pytest-timeout

      - name: Create coverage directory
        run: mkdir -p _covdata

      - name: Run conformance tests
        run: timeout 120 python -m pytest test_go_conformance.py -x -v

      - name: Merge coverage profiles
        run: go tool covdata textfmt -i=_covdata -o=coverage-go.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage-go.txt
          flags: go
          fail_ci_if_error: false
