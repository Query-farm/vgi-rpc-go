name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

  conformance:
    needs: lint
    runs-on: ubuntu-latest
    env:
      GOCOVERDIR: ${{ github.workspace }}/_covdata
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build conformance worker with coverage
        run: go build -cover -covermode=atomic -o conformance-worker ./conformance/cmd/vgi-rpc-conformance-go

      - name: Install Python dependencies
        run: pip install "vgi-rpc[http,cli]>=0.1.13" pytest pytest-timeout

      - name: Create coverage directory
        run: mkdir -p _covdata

      - name: Run conformance tests
        run: timeout 120 python -m pytest test_go_conformance.py -x -v

      - name: Merge coverage profiles
        run: go tool covdata textfmt -i=_covdata -o=coverage-go.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage-go.txt
          flags: go
          fail_ci_if_error: false
